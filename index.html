<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clydex — Powered by Deriv</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05070a; --card:#0c1018; --border:#16202e;
  --accent:#00ffc2; --adim:rgba(0,255,194,0.08);
  --red:#ff3d5a; --yellow:#ffc53d;
  --text:#e8f0f8; --muted:#4a6278;
  --mono:'DM Mono',monospace; --head:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,194,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,194,0.025) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0;
}
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;
  border-bottom:1px solid rgba(22,32,46,0.7);
  backdrop-filter:blur(14px);
  background:rgba(5,7,10,0.75);
}
.nav-logo{font-family:var(--head);font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.nav-logo em{color:var(--accent);font-style:normal;}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 20px;}
h1{font-family:var(--head);font-size:clamp(38px,8vw,74px);font-weight:800;line-height:1.06;letter-spacing:-2px;color:#fff;margin-bottom:18px;}
.btn-p{background:var(--accent);color:#05070a;border:none;border-radius:8px;font-family:var(--mono);font-size:13px;font-weight:500;padding:14px 30px;cursor:pointer;}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(5,7,10,0.88);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:380px;text-align:center;}
.mli{background:var(--accent);color:#05070a;border:none;border-radius:7px;padding:13px;cursor:pointer;width:100%;font-weight:600;}
</style>
</head>
<body>
<nav><div class="nav-logo">Clyde<em>X</em></div></nav>
<div class="hero">
  <h1>Trade smarter.</h1>
  <button class="btn-p" onclick="openModal()">Connect with Deriv</button>
</div>

<div class="overlay" id="overlay" onclick="closeOut(event)">
  <div class="modal">
    <button class="mli" onclick="loginDeriv()">🔑 &nbsp;Login with Deriv</button>
  </div>
</div>

<script>
const APP_ID = '131826';
// Dynamically set redirect to avoid URL mismatch errors
const REDIRECT_URL = window.location.origin + '/dashboard.html';

function openModal(){ document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function closeOut(e){ if(e.target===document.getElementById('overlay'))closeModal(); }

function loginDeriv(){
  window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URL)}`;
}
</script>
</body>
</html>
