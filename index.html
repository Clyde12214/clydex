<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClydeX | Official Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff444f; --bg: #0b0e11; --card: #1c1f26; --green: #0ecb81; }
        body { margin: 0; background: var(--bg); color: #eaecef; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #15171f; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); letter-spacing: 1px; }
        .balance { background: var(--card); padding: 8px 15px; border-radius: 8px; color: var(--green); font-weight: 600; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        
        nav { display: flex; background: #15171f; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; color: #848e9c; font-size: 12px; font-weight: 600; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: white; border-bottom-color: var(--primary); background: rgba(255, 68, 79, 0.05); }

        .section { flex: 1; overflow-y: auto; display: none; padding: 20px; }
        .section.active { display: block; }

        .glass-card { background: var(--card); border-radius: 16px; padding: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        
        .log-box { background: #000; height: 150px; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; overflow-y: auto; color: #00ff00; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; }
        iframe { width: 100%; height: 80vh; border: none; border-radius: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CLYDEX</div>
    <div class="balance" id="balanceDisplay">USD 0.00</div>
</header>

<nav>
    <div class="tab active" onclick="switchTab(event, 'dash')">HOME</div>
    <div class="tab" onclick="switchTab(event, 'bots')">TRADING BOT</div>
    <div class="tab" onclick="switchTab(event, 'charts')">CHARTS</div>
</nav>

<div id="dash" class="section active">
    <div class="glass-card">
        <h2 id="statusText">Welcome to ClydeX</h2>
        <p style="color: #848e9c; font-size: 14px;">Connect your account below to begin.</p>
        <button class="btn" onclick="login()">Login to Deriv</button>
    </div>
</div>

<div id="bots" class="section">
    <div class="glass-card">
        <h3>Even/Odd Bot (R_100)</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex:1; text-align:center; background: rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                <small style="color:#848e9c">WINS</small>
                <div id="wins" style="color:var(--green); font-weight:800; font-size:20px;">0</div>
            </div>
            <div style="flex:1; text-align:center; background: rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                <small style="color:#848e9c">LOSSES</small>
                <div id="losses" style="color:var(--primary); font-weight:800; font-size:20px;">0</div>
            </div>
        </div>
        <button id="botBtn" class="btn" onclick="toggleBot()">Start Auto Trading</button>
        <div class="log-box" id="botLogs">SYSTEM: Offline</div>
    </div>
</div>

<div id="charts" class="section" style="padding:0;">
    <iframe src="https://tradingview.deriv.com/v1/main.html"></iframe>
</div>

<script>
    // YOUR LIVE CREDENTIALS FROM SCREENSHOTS
    const APP_ID = '131826'; 
    const AFFILIATE_TOKEN = 'E941D587-FB92-4272-8FD5-A662EBEDEE4C'; 

    let ws, userToken, isRunning = false;
    let wins = 0, losses = 0, currentStake = 0.35;

    function switchTab(e, id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function login() {
        const redirect = window.location.href.split('?')[0];
        window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=en&brand=deriv&affiliate_token=${AFFILIATE_TOKEN}&redirect_uri=${redirect}`;
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        userToken = params.get('token1') || localStorage.getItem('token');
        if(userToken) {
            localStorage.setItem('token', userToken);
            window.history.replaceState({}, '', window.location.pathname);
            startSocket();
        }
    };

    function startSocket() {
        ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
        ws.onopen = () => {
            ws.send(JSON.stringify({ authorize: userToken }));
            document.getElementById('botLogs').innerText = "SYSTEM: Connected & Ready";
        };
        ws.onmessage = (msg) => {
            const res = JSON.parse(msg.data);
            if(res.msg_type === 'authorize') {
                document.getElementById('statusText').innerText = "Account Connected: " + res.authorize.loginid;
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
            }
            if(res.msg_type === 'balance') {
                document.getElementById('balanceDisplay').innerText = res.balance.currency + " " + res.balance.balance;
            }
            if(res.msg_type === 'proposal_open_contract' && res.proposal_open_contract.is_sold) {
                handleResult(res.proposal_open_contract);
            }
        };
    }

    function toggleBot() {
        if(!userToken) return alert("Please login to your account first!");
        isRunning = !isRunning;
        document.getElementById('botBtn').innerText = isRunning ? "Stop Bot" : "Start Auto Trading";
        document.getElementById('botBtn').style.background = isRunning ? "#444" : "var(--primary)";
        if(isRunning) {
            addLog("Bot Active: Placing Trades...");
            placeTrade();
        }
    }

    function placeTrade() {
        if(!isRunning) return;
        ws.send(JSON.stringify({
            buy: 1, price: currentStake,
            parameters: { amount: currentStake, basis: 'stake', contract_type: 'DIGITEVEN', currency: 'USD', duration: 1, duration_unit: 't', symbol: 'R_100' },
            subscribe: 1
        }));
    }

    function handleResult(contract) {
        if(contract.status === 'won') {
            wins++; document.getElementById('wins').innerText = wins;
            currentStake = 0.35; // Reset to base stake
            addLog(`Win: +$${contract.profit}`);
        } else {
            losses++; document.getElementById('losses').innerText = losses;
            currentStake *= 2.1; // Martingale logic
            addLog(`Loss: Martingale to $${currentStake.toFixed(2)}`);
        }
        if(isRunning) setTimeout(placeTrade, 1500);
    }

    function addLog(msg) {
        const box = document.getElementById('botLogs');
        box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
