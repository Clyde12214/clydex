<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clydex — Powered by Deriv</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05070a; --card:#0c1018; --border:#16202e;
  --accent:#00ffc2; --adim:rgba(0,255,194,0.08);
  --text:#e8f0f8; --muted:#4a6278;
  --mono:'DM Mono',monospace; --head:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
h1{font-family:var(--head);font-size:clamp(32px,5vw,64px);margin-bottom:20px;}
.btn-p{background:var(--accent);color:#05070a;border:none;border-radius:8px;padding:14px 30px;cursor:pointer;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--card);padding:40px;border-radius:12px;border:1px solid var(--border);}
.mli{background:var(--accent);color:#05070a;border:none;padding:12px 24px;border-radius:6px;cursor:pointer;width:100%;font-weight:700;}
</style>
</head>
<body>
<h1>Clyde<span style="color:var(--accent)">X</span></h1>
<button class="btn-p" onclick="openModal()">Connect with Deriv</button>
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="mli" onclick="loginDeriv()">🔑 Login with Deriv</button>
  </div>
</div>
<script>
const APP_ID = '131826';
const REDIRECT_URL = window.location.origin + '/dashboard.html';
function openModal(){ document.getElementById('overlay').classList.add('open'); }
function loginDeriv(){
  window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URL)}`;
}
</script>
</body>
</html>
