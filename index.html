<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClydeX | Digit Analysis & Auto-Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff444f; --bg: #0b0e11; --card: #1c1f26; --green: #0ecb81; --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: #eaecef; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #15171f; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 20px; color: var(--primary); letter-spacing: 1px; }
        .balance { background: var(--card); padding: 6px 12px; border-radius: 4px; color: var(--green); font-family: 'Roboto Mono', monospace; font-size: 14px; border: 1px solid var(--border); }
        
        nav { display: flex; background: #15171f; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #848e9c; font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid transparent; }
        .tab.active { color: white; border-bottom-color: var(--primary); background: rgba(255, 68, 79, 0.05); }

        .section { flex: 1; overflow-y: auto; display: none; padding: 15px; }
        .section.active { display: block; }

        /* Digit Pad Style (Mkoreans Style) */
        .digit-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .digit-box { background: #252932; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid var(--border); }
        .digit-num { font-weight: 800; font-size: 16px; display: block; }
        .digit-pct { font-size: 10px; color: var(--text-dim); font-family: 'Roboto Mono', monospace; }
        .bar-container { background: #13151b; height: 4px; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }

        .glass-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .log-box { background: #000; height: 100px; border-radius: 6px; padding: 10px; font-family: 'Roboto Mono', monospace; font-size: 10px; overflow-y: auto; color: #00ff00; border: 1px solid var(--border); margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CLYDEX</div>
    <div class="balance" id="balanceDisplay">USD 0.00</div>
</header>

<nav>
    <div class="tab active" onclick="switchTab(event, 'analysis')">ANALYSIS</div>
    <div class="tab" onclick="switchTab(event, 'bots')">BOT CONTROL</div>
</nav>

<div id="analysis" class="section active">
    <div class="glass-card">
        <h4 style="margin:0 0 10px 0;">LIVE DIGIT STATS (LDP)</h4>
        <div class="digit-grid" id="digitPad">
            </div>
        <p style="font-size:10px; color:#848e9c; margin-top:15px; text-align:center;">Analyzing Last 100 Ticks: Volatility 100 (1s)</p>
    </div>
    <button class="btn" onclick="login()" style="background:#252932; border:1px solid var(--border);">CONNECT DERIV ACCOUNT</button>
</div>

<div id="bots" class="section">
    <div class="glass-card">
        <h3 style="margin-top:0;">Rise/Fall Auto-Bot</h3>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span>Stake: <b id="displayStake">0.35</b></span>
            <span>Profit: <b id="displayProfit" style="color:var(--green)">0.00</b></span>
        </div>
        <button id="botBtn" class="btn" onclick="toggleBot()">START BOT</button>
        <div class="log-box" id="botLogs">SYSTEM: Ready. Connect account to trade.</div>
    </div>
</div>

<script>
    const APP_ID = '131826'; 
    const AFFILIATE = 'E941D587-FB92-4272-8FD5-A662EBEDEE4C'; 
    let ws, token, isRunning = false;
    let ticks = [];
    let stats = Array(10).fill(0);

    // Initialize Digit Pad
    const pad = document.getElementById('digitPad');
    for(let i=0; i<10; i++) {
        pad.innerHTML += `
            <div class="digit-box" id="d-box-${i}">
                <span class="digit-num">${i}</span>
                <span class="digit-pct" id="d-pct-${i}">0%</span>
                <div class="bar-container"><div class="bar-fill" id="d-bar-${i}"></div></div>
            </div>`;
    }

    function switchTab(e, id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function login() {
        const redirect = window.location.href.split('?')[0];
        window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=en&brand=deriv&affiliate_token=${AFFILIATE}&redirect_uri=${redirect}`;
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        token = params.get('token1') || localStorage.getItem('token');
        if(token) {
            localStorage.setItem('token', token);
            window.history.replaceState({}, '', window.location.pathname);
            initConnection();
        }
    };

    function initConnection() {
        ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
        ws.onopen = () => {
            ws.send(JSON.stringify({ authorize: token }));
            ws.send(JSON.stringify({ ticks: 'R_100', subscribe: 1 }));
        };
        ws.onmessage = (msg) => {
            const res = JSON.parse(msg.data);
            if(res.msg_type === 'balance') document.getElementById('balanceDisplay').innerText = res.balance.currency + " " + res.balance.balance;
            if(res.msg_type === 'tick') updateStats(res.tick.quote);
            if(res.msg_type === 'authorize') ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
        };
    }

    function updateStats(quote) {
        const lastDigit = parseInt(quote.toString().slice(-1));
        ticks.push(lastDigit);
        if(ticks.length > 100) ticks.shift();

        // Calculate Percentages
        const counts = Array(10).fill(0);
        ticks.forEach(t => counts[t]++);
        
        counts.forEach((count, i) => {
            const pct = ((count / ticks.length) * 100).toFixed(0);
            document.getElementById(`d-pct-${i}`).innerText = pct + "%";
            document.getElementById(`d-bar-${i}`).style.width = pct + "%";
            // Highlight Hot/Cold
            document.getElementById(`d-box-${i}`).style.borderColor = pct > 15 ? "var(--primary)" : "var(--border)";
        });
    }

    function toggleBot() {
        if(!token) return alert("Login first!");
        isRunning = !isRunning;
        document.getElementById('botBtn').innerText = isRunning ? "STOP BOT" : "START BOT";
        if(isRunning) addLog("Bot Active: Monitoring Digits...");
    }

    function addLog(m) {
        const box = document.getElementById('botLogs');
        box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
