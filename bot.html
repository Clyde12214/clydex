<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClydeX - Visual Bot Loader</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --maroon: #6e1026; --dark-bg: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background: #f4f4f4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .nav-tabs { background: var(--maroon); display: flex; overflow-x: auto; scrollbar-width: none; }
        .nav-item { color: #fff; text-decoration: none; padding: 15px; font-size: 12px; font-weight: bold; white-space: nowrap; }

        /* THE GRID: Matching your mkorean goal */
        .bot-selection-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 15px; 
            background: #eee;
            max-height: 180px;
            overflow-y: auto;
        }
        .mini-card { 
            background: #2d050e; 
            color: #fff; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 12px; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* WORKSPACE: Where the magic happens */
        #blocklyArea { flex: 1; position: relative; width: 100%; background: #fff; }
        #blocklyDiv { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        .bottom-bar { background: #fff; padding: 12px 15px; border-top: 1px solid #ddd; display: flex; align-items: center; }
        .btn-run { background: var(--maroon); color: white; border: none; padding: 12px 30px; border-radius: 6px; font-weight: 900; }
        .status-msg { flex: 1; text-align: center; font-size: 13px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; font-size:18px;">ClydeX</div>
    <div style="color:var(--maroon); font-weight:bold; font-size:12px;">CONNECTED</div>
</header>

<div class="nav-tabs">
    <a href="./dashboard.html" class="nav-item">Dashboard</a>
    <a href="./bot.html" class="nav-item">Free Bots</a>
    <a href="./analysis.html" class="nav-item">Analysis</a>
</div>

<div class="bot-selection-grid">
    <div class="mini-card" onclick="renderBotBlocks('SV9 PRO')">🚀 SV9 PRO</div>
    <div class="mini-card" onclick="renderBotBlocks('Digit Scanner')">🚀 Scanner</div>
    <div class="mini-card" onclick="renderBotBlocks('Martingale')">🚀 Martingale</div>
    <div class="mini-card" onclick="renderBotBlocks('Over/Under')">🚀 Over/Under</div>
</div>

<div id="blocklyArea">
    <div id="blocklyDiv"></div>
</div>

<div class="bottom-bar">
    <button class="btn-run" onclick="toggleRun()">▶ RUN</button>
    <div class="status-msg" id="statusLabel">No Bot Active</div>
</div>

<script>
    // Initialize the Workspace like mkorean
    var blocklyDiv = document.getElementById('blocklyDiv');
    var workspace = Blockly.inject(blocklyDiv, {
        toolbox: false, // Hide the side menu for a cleaner look
        scrollbars: true,
        zoom: { controls: true, wheel: true, startScale: 1.0 }
    });

    // 4. THE FUNCTION TO REFLECT THE BLOCKS
    function renderBotBlocks(botName) {
        workspace.clear(); // Wipe the screen for the new bot

        // We "fake" the XML blocks so they show up on your screen instantly
        // In a real setup, this XML string would be your bot's logic
        var xmlText = `
        <xml xmlns="https://developers.google.com/blockly/xml">
            <block type="text_print" x="20" y="20">
                <value name="TEXT">
                    <block type="text">
                        <field name="TEXT">Strategy: ${botName} Active</field>
                    </block>
                </value>
                <next>
                    <block type="controls_if">
                        <value name="IF0">
                            <block type="logic_boolean">
                                <field name="BOOL">TRUE</field>
                            </block>
                        </value>
                    </block>
                </next>
            </block>
        </xml>`;

        var xmlDom = Blockly.Xml.textToDom(xmlText);
        Blockly.Xml.domToWorkspace(xmlDom, workspace);
        
        document.getElementById('statusLabel').innerText = "Loaded: " + botName;
        document.getElementById('statusLabel').style.color = "green";
    }

    function toggleRun() {
        const label = document.getElementById('statusLabel');
        if(label.innerText === "No Bot Active") {
            alert("Choose a bot from the grid first!");
        } else {
            label.innerText = "Running Logic Blocks...";
            label.style.color = "maroon";
        }
    }

    // Auto-resize Blockly when window changes
    window.addEventListener('resize', function() {
        Blockly.svgResize(workspace);
    });
</script>

</body>
</html>
