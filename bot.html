<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClydeX - Visual Bot Loader</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --maroon: #6e1026; --dark-bg: #121212; --card-bg: #2d050e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background: #f8f9fa; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navigation like mkorean */
        .top-nav { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .nav-tabs { background: var(--maroon); display: flex; overflow-x: auto; }
        .tab-item { color: #fff; text-decoration: none; padding: 15px 20px; font-size: 13px; font-weight: bold; opacity: 0.7; }
        .tab-item.active { opacity: 1; border-bottom: 3px solid white; }

        /* THE VISUAL WORKSPACE (This is where the blocks appear) */
        #blocklyDiv { 
            flex: 1; 
            width: 100%; 
            background: #ffffff; 
            border-top: 1px solid #ccc;
        }

        /* 2-Column Grid for Bot Selection */
        .bot-selection-area { padding: 10px; background: #eee; max-height: 200px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .bot-mini-card { background: var(--card-bg); color: #fff; padding: 10px; border-radius: 8px; font-size: 11px; text-align: center; cursor: pointer; }

        /* Bottom Controls */
        .bottom-bar { background: #fff; border-top: 1px solid #ddd; padding: 10px 15px; display: flex; align-items: center; }
        .btn-run { background: var(--maroon); color: white; border: none; padding: 10px 30px; border-radius: 4px; font-weight: 900; }
        .status-msg { flex: 1; text-align: center; font-size: 12px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="font-weight:900;">ClydeX</div>
    <div style="font-weight:bold; color:var(--maroon);">ACCOUNT CONNECTED</div>
</div>

<div class="nav-tabs">
    <a href="#" class="tab-item active">Free Bots</a>
    <a href="./dashboard.html" class="tab-item">Dashboard</a>
    <a href="./analysis.html" class="tab-item">Analysis Tools</a>
</div>

<div class="bot-selection-area">
    <div class="bot-mini-card" onclick="loadVisualBot('SV9 PRO')">🚀 SV9 PRO</div>
    <div class="bot-mini-card" onclick="loadVisualBot('SV9')">🚀 SV9</div>
    <div class="bot-mini-card" onclick="loadVisualBot('Scanner')">🚀 Scanner</div>
    <div class="bot-mini-card" onclick="loadVisualBot('Digit Bot')">🚀 Digit Bot</div>
</div>

<div id="blocklyDiv"></div>

<div class="bottom-bar">
    <button class="btn-run" onclick="startBot()">▶ RUN</button>
    <div class="status-msg" id="displayMsg">Bot is not running</div>
</div>

<script>
    // Initialize the Blockly Workspace
    var workspace = Blockly.inject('blocklyDiv', {
        readOnly: false,
        scrollbars: true,
        trashcan: true,
        zoom: { controls: true, wheel: true, startScale: 0.8 }
    });

    // 3. THIS FUNCTION MAKES IT "REFLECT" ON SCREEN
    function loadVisualBot(name) {
        // In a real app, this would load the XML file. 
        // For now, we create a "Fake" block to show it works.
        workspace.clear();
        
        // Define a "Trade" block like in mkorean
        Blockly.Blocks['trade_params'] = {
          init: function() {
            this.appendDummyInput().appendField("1. Trade parameters: " + name);
            this.appendDummyInput().appendField("Market: Volatility 10 (1s)");
            this.appendDummyInput().appendField("Stake: 0.35 USD");
            this.setColour(230);
          }
        };

        var block = workspace.newBlock('trade_params');
        block.initSvg();
        block.render();
        
        document.getElementById('displayMsg').innerText = "Loaded Strategy: " + name;
        document.getElementById('displayMsg').style.color = "green";
    }

    function startBot() {
        const msg = document.getElementById('displayMsg');
        if(msg.innerText === "Bot is not running") {
            alert("Load a bot first!");
        } else {
            msg.innerText = "Bot is Active & Executing Blocks...";
            msg.style.color = "maroon";
        }
    }
</script>

</body>
</html>
