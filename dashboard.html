<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClydeX - Professional Trader</title>
    <style>
        :root { --deriv-red: #ff444f; --dark-bg: #0e0e0e; --card-bg: #15171a; --text-gray: #999; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'IBM Plex Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; }

        /* Top Header */
        header { background: #101113; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-weight: 900; color: var(--deriv-red); font-size: 20px; }
        .balance-box { background: #2a2d32; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 14px; color: #00ffaa; }

        /* Navigation Tabs (Like your screenshots) */
        nav { background: #101113; display: flex; border-bottom: 1px solid #222; overflow-x: auto; }
        .tab { padding: 12px 20px; font-size: 13px; color: var(--text-gray); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab.active { color: white; border-bottom: 2px solid var(--deriv-red); background: rgba(255,68,79,0.05); }

        /* Content Area */
        .main-content { flex: 1; padding: 15px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }

        /* UI Elements */
        .card { background: var(--card-bg); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .btn-run { background: var(--deriv-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 4px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CLYDEX</div>
    <div class="balance-box" id="balanceText">USD 0.00</div>
</header>

<nav>
    <div class="tab active" onclick="openTab(event, 'dash')">📊 Dashboard</div>
    <div class="tab" onclick="openTab(event, 'bots')">🤖 Free Bots</div>
    <div class="tab" onclick="openTab(event, 'charts')">📈 Charts</div>
    <div class="tab" onclick="openTab(event, 'builder')">🛠 Builder</div>
</nav>

<div id="dash" class="main-content active">
    <div class="card">
        <small style="color:var(--text-gray)">Account ID</small>
        <div id="accID" style="font-size: 18px; margin-top:5px;">Connecting...</div>
    </div>
    <div class="card">
        <h3>Recent Activity</h3>
        <p style="color:var(--text-gray); font-size:12px;">No recent trades found for this session.</p>
    </div>
</div>

<div id="bots" class="main-content">
    <div class="card">
        <h3>SV9 PRO AUTO-BOT</h3>
        <p style="font-size:12px; color:var(--text-gray)">Strategy: Even/Odd Reversal with Martingale</p>
        <input type="number" placeholder="Stake (0.35)" style="width:90%; padding:10px; margin-bottom:10px; background:#222; border:1px solid #444; color:white;">
        <button class="btn-run">RUN BOT</button>
    </div>
</div>

<div id="charts" class="main-content">
    <iframe src="https://tradingview.deriv.com/v1/main.html"></iframe>
</div>

<div id="builder" class="main-content">
    <div class="card" style="text-align:center; padding:50px 20px;">
        <p>Visual Bot Builder is being synced with your Partner ID.</p>
        <small style="color:var(--deriv-red)">Coming Soon</small>
    </div>
</div>

<script>
    const ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=131826');

    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("main-content");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        
        let tabs = document.getElementsByClassName("tab");
        for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
        
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Logic to catch the login from index.html
    document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token1');
        if (token) {
            localStorage.setItem('user_token', token);
            window.history.replaceState({}, document.title, window.location.pathname);
            initTrade(token);
        } else if (localStorage.getItem('user_token')) {
            initTrade(localStorage.getItem('user_token'));
        } else {
            window.location.href = "index.html";
        }
    });

    function initTrade(token) {
        ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
        ws.onmessage = (msg) => {
            const res = JSON.parse(msg.data);
            if (res.msg_type === 'authorize') {
                document.getElementById('accID').innerText = res.authorize.loginid;
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
            }
            if (res.msg_type === 'balance') {
                document.getElementById('balanceText').innerText = res.balance.currency + " " + res.balance.balance;
            }
        };
    }
</script>
</body>
</html>
