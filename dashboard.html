<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ClydeX Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* CSS remains the same as your current visual style */
:root { --maroon: #6e1026; --dark-maroon: #4d0a1a; --bg: #ffffff; --border: #e0e0e0; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Roboto', sans-serif; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
header { padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
nav { background: var(--maroon); display: flex; overflow-x: auto; }
.nav-item { color: #fff; text-decoration: none; padding: 12px 15px; font-size: 13px; white-space: nowrap; }
.nav-item.active { background: var(--dark-maroon); border-bottom: 3px solid #ff3d5a; }
.tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
.tool-card { border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; background: #fff; cursor: pointer; }
.bottom-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); padding: 10px; display: flex; align-items: center; gap: 10px; }
.btn-run { background: var(--maroon); color: #fff; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; }
</style>
</head>
<body>

<header>
    <div style="font-weight:900; font-size:20px;">ClydeX</div>
    <div>
        <button onclick="window.location.href='index.html'" style="background:var(--maroon); color:#fff; border:none; padding:5px 10px; border-radius:4px;">LOG IN</button>
    </div>
</header>

<nav>
    <a href="#" class="nav-item">YouTube Live</a>
    <a href="#" class="nav-item">Free Bots</a>
    <a href="#" class="nav-item active">Dashboard</a>
</nav>

<main>
    <input type="file" id="botFilePicker" style="display: none;" accept=".xml,.json" onchange="processBotFile(this.files)">

    <div class="tool-grid">
        <div class="tool-card" onclick="document.getElementById('botFilePicker').click()">
            <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png" width="40" alt="folder"><br>
            <span style="font-size:12px; font-weight:bold;">Load Bot</span>
        </div>
        <div class="tool-card">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" width="40" alt="star"><br>
            <span style="font-size:12px; font-weight:bold;">Premium Bots</span>
        </div>
    </div>
</main>

<div class="bottom-bar">
    <button class="btn-run" id="runAction" onclick="toggleTrading()">▶ RUN</button>
    <div id="statusLabel" style="font-size:12px; color:#888; flex:1; text-align:center;">Bot is not running</div>
</div>

<script>
// --- FUNCTIONALITY LOGIC ---

// 1. Make the "Load Bot" button work on your phone
function processBotFile(files) {
    if (files.length > 0) {
        const file = files[0];
        document.getElementById('statusLabel').innerText = "Loaded: " + file.name;
        document.getElementById('statusLabel').style.color = "#2e7d32";
        
        const reader = new FileReader();
        reader.onload = function(e) {
            // This is where the XML/JSON content is stored
            console.log("File content ready for trading engine.");
            alert("Success: " + file.name + " is loaded and ready to RUN.");
        };
        reader.readAsText(file);
    }
}

// 2. Make the "RUN" button work
let isRunning = false;
function toggleTrading() {
    const runBtn = document.getElementById('runAction');
    const status = document.getElementById('statusLabel');
    
    // Check if a token exists before running
    const token = sessionStorage.getItem('dx_token');
    if(!token) {
        alert("Please login first to connect your account.");
        return;
    }

    isRunning = !isRunning;
    if(isRunning) {
        runBtn.innerText = "■ STOP";
        runBtn.style.background = "#000";
        status.innerText = "Running bot on Volatility 100...";
        status.style.color = "red";
        // Start your trading logic here
    } else {
        runBtn.innerText = "▶ RUN";
        runBtn.style.background = "var(--maroon)";
        status.innerText = "Bot stopped";
        status.style.color = "#888";
    }
}
</script>

</body>
</html>
