<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClydeX - Dashboard</title>
    <style>
        :root { --maroon: #6e1026; --green: #0ecb81; }
        body { margin: 0; background: #f4f4f4; font-family: sans-serif; }
        
        /* Header */
        header { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 20px; }
        .acc-info { font-size: 12px; font-weight: bold; color: var(--maroon); border: 1px solid var(--maroon); padding: 4px 10px; border-radius: 4px; }

        /* Status Banner */
        .conn-banner { background: var(--maroon); color: white; padding: 12px; text-align: center; font-size: 12px; font-weight: bold; transition: 0.3s; }
        
        /* Content Area */
        .main-container { padding: 20px; text-align: center; }
        .welcome-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-nav { display: block; width: 100%; padding: 15px; margin-top: 15px; background: var(--maroon); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">ClydeX</div>
    <div class="acc-info" id="accID">Checking...</div>
</header>

<div class="conn-banner" id="statusBanner">WAITING FOR AUTHORIZATION...</div>

<div class="main-container">
    <div class="welcome-card">
        <h2 id="welcomeUser">Welcome</h2>
        <p style="color: #666; font-size: 14px;">Your account is now securely connected to the Deriv API.</p>
        
        <a href="./bot.html" class="btn-nav">GO TO FREE BOTS</a>
        <a href="./analysis.html" class="btn-nav" style="background:#eee; color:#333;">MARKET ANALYSIS</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Check the URL for the token sent by Deriv
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token1'); 
        const account = urlParams.get('acct1');

        if (token) {
            // 2. Save session to local storage
            localStorage.setItem('deriv_token', token);
            localStorage.setItem('deriv_account', account);
            
            // 3. Clean the URL (removes the long token string from the address bar)
            window.history.replaceState({}, document.title, window.location.pathname);
            
            updateUI(account);
        } else if (localStorage.getItem('deriv_token')) {
            // If user refreshed, load their saved session
            updateUI(localStorage.getItem('deriv_account'));
        } else {
            // No token found? Send them back to the login/loading page
            window.location.href = "index.html";
        }
    });

    function updateUI(accName) {
        const banner = document.getElementById('statusBanner');
        banner.innerText = "✓ ACCOUNT AUTHORIZED & SECURE";
        banner.style.background = "#0ecb81"; // Change to green
        
        document.getElementById('accID').innerText = accName;
        document.getElementById('welcomeUser').innerText = "Account: " + accName;
    }
</script>
</body>
</html>
