<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClydeX — Professional Trading Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05070a;--surface:#0b1018;--border:#16202e;--accent:#00ffc2;--text:#e8f0f8;--muted:#4a6278;
  --win:#00ffc2;--loss:#ff3d5a;--mono:'DM Mono',monospace;--head:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* 1. TOP HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.hlogo{font-family:var(--head);font-weight:800;font-size:20px;}
.hlogo em{color:var(--accent);font-style:normal;}
.hbal{background:rgba(0,255,194,0.1);border:1px solid var(--accent);padding:5px 15px;border-radius:4px;color:var(--accent);font-weight:700;}

/* 2. APP NAVBAR (The Menu) */
.app-navbar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);height:42px;overflow-x:auto;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;scrollbar-width: none;}
.app-navbar::-webkit-scrollbar { display: none; }
.nav-item{color:var(--muted);text-decoration:none;font-size:10px;text-transform:uppercase;white-space:nowrap;padding:8px 12px;border-radius:4px;transition:0.2s;font-weight:500;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.nav-item.active{color:var(--accent);background:rgba(0,255,194,0.05);font-weight:600;}

/* 3. MAIN LAYOUT */
main{display:none;flex:1;grid-template-columns:1fr 380px;overflow:hidden;}

/* Left Column: Market Info */
.content-area{padding:20px;display:flex;flex-direction:column;gap:15px;overflow-y:auto;}
.price-display{font-size:32px;font-weight:800;color:var(--accent);font-family:var(--head);}

/* Right Column: Trading Panel */
.trading-panel{background:var(--surface);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:15px;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-group label{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:1px;}
input{background:var(--bg);border:1px solid var(--border);color:#fff;padding:12px;border-radius:6px;outline:none;font-family:var(--mono);width:100%;}
input:focus{border-color:var(--accent);}

.trade-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5px;}
.btn-trade{padding:16px;border:none;border-radius:6px;font-weight:800;cursor:pointer;font-family:var(--head);transition:0.2s;font-size:12px;}
.btn-over{background:var(--win);color:#000;}
.btn-under{background:var(--loss);color:#fff;}
.btn-trade:active{transform:scale(0.96);}

/* Transaction Log */
.log-container{flex:1;overflow-y:auto;margin-top:10px;border-top:1px solid var(--border);padding-top:15px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{text-align:left;color:var(--muted);padding:8px 0;text-transform:uppercase;font-size:9px;}
td{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.win-text{color:var(--win);font-weight:bold;}
.loss-text{color:var(--loss);font-weight:bold;}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;font-family:var(--head);font-weight:800;letter-spacing:2px;}
</style>
</head>
<body>

<div id="loading">CLYDEX LOADING...</div>

<header id="app-header" style="display:none">
  <div class="hlogo">Clyde<em>X</em></div>
  <div id="hbal" class="hbal">0.00 USD</div>
</header>

<nav class="app-navbar" id="app-nav" style="display:none">
  <a href="dashboard.html" class="nav-item active">Dashboard</a>
  <a href="https://www.youtube.com/live" target="_blank" class="nav-item">YouTube Live</a>
  <a href="https://app.deriv.com" target="_blank" class="nav-item">D-Trader</a>
  <a href="#" onclick="alert('Bot Builder coming soon!')" class="nav-item">Bot Builder</a>
  <a href="#" onclick="alert('Analysis Tools coming soon!')" class="nav-item">Analysis Tools</a>
  <a href="#" onclick="alert('Copy Trading coming soon!')" class="nav-item">Copy Trading</a>
  <a href="#" onclick="alert('Flipper coming soon!')" class="nav-item">Flipper</a>
</nav>

<main id="app-main">
  <div class="content-area">
    <div style="font-size:10px;color:var(--muted);letter-spacing:1px;">VOLATILITY 100 (1S) INDEX</div>
    <div id="last-tick" class="price-display">0.00</div>
    <div style="flex:1;background:#000;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--muted);position:relative;overflow:hidden;">
        <div style="text-align:center;z-index:2;">
            <p style="margin-bottom:10px;">Market Tick Stream Connected</p>
            <div style="font-size:9px;color:var(--accent);border:1px solid var(--accent);padding:4px 10px;border-radius:20px;display:inline-block;">LIVE DATA FEED</div>
        </div>
    </div>
  </div>

  <div class="trading-panel">
    <div class="input-group">
        <label>Stake (Amount USD)</label>
        <input type="number" id="stake" value="10.00" step="1">
    </div>
    <div class="input-group">
        <label>Prediction (Digit)</label>
        <input type="number" id="prediction" value="5" min="0" max="9">
    </div>
    
    <div class="trade-btns">
        <button class="btn-trade btn-over" onclick="placeTrade('DIGITOVER')">PURCHASE OVER</button>
        <button class="btn-trade btn-under" onclick="placeTrade('DIGITUNDER')">PURCHASE UNDER</button>
    </div>

    <div class="log-container">
        <h4 style="font-size:10px; color:var(--muted); margin-bottom:10px; letter-spacing:1px;">RECENT TRANSACTIONS</h4>
        <table>
            <thead><tr><th>Reference</th><th>L-Digit</th><th>Result</th></tr></thead>
            <tbody id="trade-log"></tbody>
        </table>
        <div style="margin-top:auto; padding-top:20px;">
            <div id="hname" style="font-size:11px; color:var(--text); opacity:0.6;">Account: ...</div>
            <button onclick="sessionStorage.clear(); location.reload();" style="margin-top:10px; background:none; border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:9px; text-transform:uppercase;">Sign Out</button>
        </div>
    </div>
  </div>
</main>

<script>
const APP_ID = '131826';
const WS_URL = 'wss://ws.binaryws.com/websockets/v3?app_id=' + APP_ID;
let ws, activeToken;

function boot() {
  activeToken = sessionStorage.getItem('dx_token') || new URLSearchParams(window.location.search).get('token1');
  if(!activeToken){ window.location.href='index.html'; return; }
  sessionStorage.setItem('dx_token', activeToken);
  window.history.replaceState({}, '', 'dashboard.html');
  
  showApp();
  connect();
}

function showApp(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app-header').style.display='flex';
  document.getElementById('app-nav').style.display='flex';
  document.getElementById('app-main').style.display='grid';
}

function connect(){
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({authorize: activeToken}));
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.msg_type==='authorize'){
      document.getElementById('hname').innerText = 'Account ID: ' + data.authorize.loginid;
      ws.send(JSON.stringify({balance:1, subscribe:1}));
      ws.send(JSON.stringify({ticks:'R_100', subscribe:1}));
    }
    if(data.msg_type==='balance') document.getElementById('hbal').innerText = data.balance.balance.toLocaleString() + ' ' + data.balance.currency;
    if(data.msg_type==='tick') document.getElementById('last-tick').innerText = data.tick.quote.toFixed(2);
    
    if(data.msg_type==='buy') addLogEntry(data.buy.contract_id, "Processing...");
    if(data.msg_type==='proposal_open_contract' && data.proposal_open_contract.is_sold) updateLogEntry(data.proposal_open_contract);
  }
}

function placeTrade(type) {
  const stakeValue = document.getElementById('stake').value;
  const predValue = document.getElementById('prediction').value;
  
  ws.send(JSON.stringify({
    "buy": 1,
    "subscribe": 1,
    "price": parseFloat(stakeValue),
    "parameters": {
      "amount": parseFloat(stakeValue),
      "basis": "stake",
      "contract_type": type,
      "currency": "USD",
      "duration": 1,
      "duration_unit": "t",
      "symbol": "R_100",
      "barrier": predValue
    }
  }));
}

function addLogEntry(id, status) {
    const row = `<tr id="tr-${id}"><td>#${id.toString().slice(-6)}</td><td id="ld-${id}">-</td><td id="res-${id}">${status}</td></tr>`;
    document.getElementById('trade-log').insertAdjacentHTML('afterbegin', row);
}

function updateLogEntry(c) {
    const id = c.contract_id;
    const lastDigit = c.exit_tick_display_value.slice(-1);
    const profit = c.profit;
    
    const row = document.getElementById(`tr-${id}`);
    if(row){
        document.getElementById(`ld-${id}`).innerText = lastDigit;
        const res = document.getElementById(`res-${id}`);
        res.innerText = profit > 0 ? `WIN (+$${profit.toFixed(2)})` : `LOSS ($${profit.toFixed(2)})`;
        res.className = profit > 0 ? "win-text" : "loss-text";
    }
}

boot();
</script>
</body>
</html>
