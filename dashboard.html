<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClydeX — Mkorean Style</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05070a;--surface:#0b1018;--border:#16202e;--accent:#00ffc2;--text:#e8f0f8;--muted:#4a6278;
  --win:#00ffc2;--loss:#ff3d5a;--mono:'DM Mono',monospace;--head:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column;height:100vh;overflow:hidden;}

header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.hlogo{font-family:var(--head);font-weight:800;font-size:20px;}
.hbal{background:rgba(0,255,194,0.1);border:1px solid var(--accent);padding:5px 15px;border-radius:4px;color:var(--accent);font-weight:700;}

/* Main Grid */
main{display:none;flex:1;grid-template-columns:1fr 380px;overflow:hidden;}

/* Left: Chart & Statistics */
.content-area{padding:20px;display:flex;flex-direction:column;gap:15px;overflow-y:auto;}
.price-display{font-size:32px;font-weight:800;color:var(--accent);font-family:var(--head);}

/* Right: Trading Panel */
.trading-panel{background:var(--surface);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:20px;}
.input-group{display:flex;flex-direction:column;gap:8px;}
.input-group label{font-size:10px;text-transform:uppercase;color:var(--muted);}
input{background:var(--bg);border:1px solid var(--border);color:#fff;padding:12px;border-radius:6px;outline:none;font-family:var(--mono);}
input:focus{border-color:var(--accent);}

.trade-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-trade{padding:15px;border:none;border-radius:6px;font-weight:800;cursor:pointer;font-family:var(--head);}
.btn-over{background:var(--win);color:#000;}
.btn-under{background:var(--loss);color:#fff;}

/* Log Table */
.log-container{flex:1;overflow-y:auto;margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{text-align:left;color:var(--muted);padding:8px 0;}
td{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.win-text{color:var(--win);}
.loss-text{color:var(--loss);}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;}
</style>
</head>
<body>

<div id="loading">Connecting to Mkorean WWN Engine...</div>

<header id="app-header" style="display:none">
  <div class="hlogo">Clyde<em>X</em></div>
  <div id="hbal" class="hbal">0.00 USD</div>
</header>

<main id="app-main">
  <div class="content-area">
    <div style="font-size:10px;color:var(--muted)">VOLATILITY 100 (1S) INDEX</div>
    <div id="last-tick" class="price-display">0.00</div>
    <div style="flex:1;background:#000;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--muted)">
        [ TRADINGVIEW CHART HERE ]
    </div>
  </div>

  <div class="trading-panel">
    <div class="input-group">
        <label>Stake (USD)</label>
        <input type="number" id="stake" value="10.00">
    </div>
    <div class="input-group">
        <label>Prediction (0-9)</label>
        <input type="number" id="prediction" value="5" min="0" max="9">
    </div>
    
    <div class="trade-btns">
        <button class="btn-trade btn-over" onclick="placeTrade('DIGITOVER')">OVER</button>
        <button class="btn-trade btn-under" onclick="placeTrade('DIGITUNDER')">UNDER</button>
    </div>

    <div class="log-container">
        <table>
            <thead><tr><th>Reference</th><th>Last Digit</th><th>Result</th></tr></thead>
            <tbody id="trade-log"></tbody>
        </table>
    </div>
  </div>
</main>

<script>
const APP_ID = '131826';
const WS_URL = 'wss://ws.binaryws.com/websockets/v3?app_id=' + APP_ID;
let ws, activeToken;

function boot() {
  activeToken = sessionStorage.getItem('dx_token') || new URLSearchParams(window.location.search).get('token1');
  if(!activeToken){ window.location.href='index.html'; return; }
  sessionStorage.setItem('dx_token', activeToken);
  window.history.replaceState({}, '', 'dashboard.html');
  
  showApp();
  connect();
}

function showApp(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app-header').style.display='flex';
  document.getElementById('app-main').style.display='grid';
}

function connect(){
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({authorize: activeToken}));
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.msg_type==='authorize'){
      ws.send(JSON.stringify({balance:1, subscribe:1}));
      ws.send(JSON.stringify({ticks:'R_100', subscribe:1}));
    }
    if(data.msg_type==='balance') document.getElementById('hbal').innerText = data.balance.balance.toFixed(2) + ' ' + data.balance.currency;
    if(data.msg_type==='tick'){
      document.getElementById('last-tick').innerText = data.tick.quote.toFixed(2);
    }
    if(data.msg_type==='buy'){
      addLogEntry(data.buy.contract_id, "Processing...");
    }
    if(data.msg_type==='proposal_open_contract'){
        if(data.proposal_open_contract.is_sold) {
            updateLogEntry(data.proposal_open_contract);
        }
    }
  }
}

function placeTrade(type) {
  const stake = document.getElementById('stake').value;
  const pred = document.getElementById('prediction').value;
  
  ws.send(JSON.stringify({
    "buy": 1,
    "subscribe": 1,
    "price": stake,
    "parameters": {
      "amount": parseFloat(stake),
      "basis": "stake",
      "contract_type": type,
      "currency": "USD",
      "duration": 1,
      "duration_unit": "t",
      "symbol": "R_100",
      "barrier": pred
    }
  }));
}

function addLogEntry(id, status) {
    const row = `<tr id="tr-${id}"><td>#${id.toString().slice(-5)}</td><td id="ld-${id}">-</td><td id="res-${id}">${status}</td></tr>`;
    document.getElementById('trade-log').insertAdjacentHTML('afterbegin', row);
}

function updateLogEntry(contract) {
    const id = contract.contract_id;
    const exitTick = contract.exit_tick_display_value;
    const lastDigit = exitTick.slice(-1);
    const profit = contract.profit;
    
    document.getElementById(`ld-${id}`).innerText = lastDigit;
    const resCell = document.getElementById(`res-${id}`);
    if(profit > 0) {
        resCell.innerText = "WIN";
        resCell.className = "win-text";
    } else {
        resCell.innerText = "LOSS";
        resCell.className = "loss-text";
    }
}

boot();
</script>
</body>
</html>
